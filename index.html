<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bear Classifier</title>
    <meta
      name="description"
      content="上传一张熊的图片，区分黑熊、棕熊与泰迪熊。由 Gradio API 驱动。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>

    <section class="gate" id="gate" aria-label="登录">
      <div class="gate-card">
        <p class="brand-mark gate-brand">Bear Classifier</p>
        <h1>登录</h1>
        <p class="lede">与 Gradio 使用同一套用户名和密码。</p>
        <form id="login-form" class="login-form">
          <label class="field">
            <span>用户名</span>
            <input
              id="username-input"
              type="text"
              name="username"
              autocomplete="username"
              required
              autofocus
            />
          </label>
          <label class="field">
            <span>密码</span>
            <input
              id="password-input"
              type="password"
              name="password"
              autocomplete="current-password"
              required
            />
          </label>
          <button type="submit" class="btn primary" id="login-btn">进入</button>
          <p class="status" id="login-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <main class="stage" id="app" hidden>
      <header class="brand">
        <p class="brand-mark">Bear Classifier</p>
        <h1>这只熊是哪一种？</h1>
        <p class="lede">上传图片，调用已部署的 Gradio API 完成分类。</p>
      </header>

      <section class="workspace" aria-label="上传与识别">
        <label class="dropzone" id="dropzone" for="file-input">
          <input
            id="file-input"
            type="file"
            accept="image/*"
            hidden
          />
          <div class="dropzone-visual" id="preview-wrap">
            <img id="preview" alt="" hidden />
            <div class="dropzone-idle" id="idle-hint">
              <span class="dropzone-icon" aria-hidden="true"></span>
              <strong>选择或拖入图片</strong>
              <span>支持 JPG / PNG / WebP</span>
            </div>
          </div>
        </label>

        <div class="actions">
          <button type="button" class="btn primary" id="classify-btn" disabled>
            开始识别
          </button>
          <button type="button" class="btn ghost" id="clear-btn" disabled>
            清除
          </button>
          <button type="button" class="btn ghost" id="logout-btn">退出</button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite"></p>

        <div class="results" id="results" hidden>
          <p class="results-kicker">预测结果</p>
          <p class="results-label" id="top-label"></p>
          <ul class="bars" id="bars"></ul>
        </div>
      </section>

      <footer class="foot">
        <p>
          API：
          <a href="https://bear-sg.jklands.com/" target="_blank" rel="noreferrer"
            >bear-sg.jklands.com</a
          >
        </p>
      </footer>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
